<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mensaje de Éxito</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e6f0ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .message-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            width: 400px;
            text-align: center;
        }
        .message-container h2 {
            color: #0056b3;
        }
        .alert-success {
            color: green;
            background-color: #d4edda;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .btn {
            background-color: #0056b3;
            color: white;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #004494;
        }
    </style>
</head>
<body>
    <div class="message-container">
        <!-- Mostrar los mensajes de éxito -->
        {% if messages %}
            <div class="alert-success">
                {% for message in messages %}
                    {{ message }}
                {% endfor %}
            </div>
        {% endif %}

        <!-- Enlace para redirigir a la página principal -->
        <a href="{% url 'pagina_principal' %}">
            <button class="btn">Ir a la Página Principal</button>
        </a>
    </div>
</body>
</html>
