<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actualizar Avance</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin: 50px auto;
            width: 400px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .btn {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Actualizar avance de "{{ tarea.nombre }}"</h2>
    <form method="POST">
        {% csrf_token %}
        <label for="avance">Nuevo Avance:</label><br>
        <textarea name="avance" rows="5" cols="40" required>{{ tarea.avance }}</textarea><br><br>
        <button type="submit" class="btn">Guardar avance</button>
    </form>
</div>

</body>
</html>
