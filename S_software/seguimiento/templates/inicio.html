<!DOCTYPE html>
<html lang="es">
<head>
    <title>Hotel Canoza Real</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/estilo.css' %}">
</head>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f0f8ff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
        color: #333;
    }

    .container {
        background-color: white;
        padding: 2rem;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        max-width: 600px;
        width: 100%;
        position: relative;
        overflow: hidden;
    }

    .container:before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 5px;
        background: linear-gradient(to right, #007bff, #00bfff, #1e90ff);
    }

    .container:after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 5px;
        background: linear-gradient(to right, #1e90ff, #00bfff, #007bff);
    }

    h1 {
        color: #003366;
        margin-bottom: 1.5rem;
        font-size: 2.2rem;
        font-weight: 700;
    }

    p {
        color: #666;
        font-size: 1.1rem;
        margin-bottom: 2rem;
    }

    .btn {
        display: inline-block;
        background-color: #007bff;
        color: white;
        padding: 0.8rem 2rem;
        font-size: 1.2rem;
        font-weight: 600;
        border: none;
        border-radius: 5px;
        text-decoration: none;
        cursor: pointer;
        transition: background-color 0.3s ease, transform 0.3s ease;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .btn:hover {
        background-color: #0056b3;
        transform: scale(1.05);
    }

    .image-placeholder {
        margin-top: 2rem;
        height: 200px;
        background-color: #e0e0e0;
        border: 2px dashed #ccc;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 10px;
        color: #666;
        font-size: 1rem;
    }

    .imagen {
        display: flex;
        justify-content: center;
        margin-top: 2rem;
    }

    .imagen img {
        max-width: 100%;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
</style>
<body>
    <div class="container">
        <h1>Bienvenidos al sistema de registro <br> Empresa de software</h1>
        <p>Por favor, haga clic en el botón para acceder al sistema.</p>
        <a href="{% url 'inicio_sesion' %}" class="btn">Abrir</a>
        <div class="imagen">
            <img src="{% static 'img/logo_SF.png' %}" alt="Presentación Hotel Canoza Real">
        </div>
    </div>
</body>
</html>
