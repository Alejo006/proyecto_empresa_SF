{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio de Sesión - Cazona Real</title>
    <link rel="stylesheet" href="{% static 'css/inicio_sesion_cazona.css' %}">
</head>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f0f8ff;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: #333;
    }

    .contenedor {
        background-color: white;
        padding: 3rem;
        border-radius: 10px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        max-width: 450px;
        width: 100%;
        text-align: center;
    }

    header {
        margin-bottom: 2rem;
    }

    .tit {
        color: #007bff;
        font-size: 2.5rem;
        font-weight: 700;
    }

    .inicio {
        display: inline-block;
        text-decoration: none;
        font-size: 1rem;
        color: #007bff;
        margin-top: 1rem;
        transition: color 0.3s ease;
    }

    .inicio:hover {
        color: #0056b3;
    }

    .inicio img {
        width: 20px;
        margin-right: 5px;
        vertical-align: middle;
    }

    .inicio_sesion {
        margin-top: 2rem;
    }

    h2 {
        color: #003366;
        margin-bottom: 1.5rem;
        font-size: 1.8rem;
        font-weight: 600;
    }

    .alert {
        background-color: #f8d7da; /* Color de fondo rojo claro */
        color: #ff0019; /* Color de texto */
        border: 1px solid #f5c6cb; /* Borde rojo */
        padding: 10px;
        margin: 10px 0;
        border-radius: 5px;
        font-size: 1rem;
    }

    form {
        display: flex;
        flex-direction: column;
    }

    label {
        text-align: left;
        font-size: 1rem;
        margin-bottom: 0.5rem;
        color: #003366;
    }

    input {
        padding: 0.8rem;
        margin-bottom: 1rem;
        border-radius: 5px;
        border: 1px solid #ccc;
        font-size: 1rem;
        transition: border 0.3s ease;
    }

    input:focus {
        border-color: #007bff;
        outline: none;
    }

    .btn {
        padding: 0.8rem 2rem;
        font-size: 1.1rem;
        font-weight: 600;
        color: white;
        background-color: #007bff;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.3s ease, transform 0.3s ease;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .btn:hover {
        background-color: #0056b3;
        transform: scale(1.05);
    }

    .imagen {
        margin-top: 2rem;
    }

    .imagen img {
        width: 50%;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .registro-btn {
        margin-top: 1.5rem;
        padding: 0.8rem 2rem;
        font-size: 1.1rem;
        font-weight: 600;
        color: #007bff;
        background-color: white;
        border: 2px solid #007bff;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.3s ease, transform 0.3s ease;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .registro-btn:hover {
        background-color: #007bff;
        color: white;
        transform: scale(1.05);
    }
</style>

<body>
    <div class="contenedor">
        <header>
            <h1 class="tit">Cazona Real</h1>
            <a href="{% url 'inicio_sesion' %}" class="inicio">
                <img src="{% static 'img/inicio.png' %}" alt="Inicio" id="inicioi">
                Inicio</a>
        </header>
        <div class="inicio_sesion">
            <h2>INICIO DE SESIÓN</h2>

            <!-- Aquí se mostrarán los mensajes -->
            {% if messages %}
                <div class="alert">
                    {% for message in messages %}
                        <p>{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}

            <form method="POST" action="{% url 'inicio_sesion' %}">
                {% csrf_token %}
                <label for="email">Correo Electrónico</label>
                <input type="email" name="email" placeholder="tu@email" required id="email">

                <label for="password">Contraseña</label>
                <input type="password" name="password" placeholder="******" required id="password">

                <button type="submit" class="btn">INGRESAR</button>
            </form>

            <!-- Botón para ir a la página de registro -->
            <a href="{% url 'registro_usuario' %}" class="registro-btn">¿No tienes cuenta? Regístrate</a>
        </div>
    </div>
</body>
</html>
