<html>
<head>
    <title>Registro de Usuario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>

<body class="bg-blue-100">
    <div class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-2xl">
            <h1 class="text-3xl font-extrabold text-blue-600 text-center mb-6">Registro de Usuario</h1>
            <p class="text-gray-500 text-center mb-8">Por favor, complete el formulario para registrarse.</p>

            <form id="usuarioForm" method="POST" action="{% url 'registro_usuario' %}">
                {% csrf_token %}
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Nombre de Usuario</label>
                        <input type="text" name="usuario" required class="w-full p-3 border-2 border-blue-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Correo Electrónico</label>
                        <input type="email" name="correo" required class="w-full p-3 border-2 border-blue-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Teléfono</label>
                        <input type="text" name="telefono" class="w-full p-3 border-2 border-blue-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Fecha de Nacimiento</label>
                        <input type="date" name="fecha_nacimiento" class="w-full p-3 border-2 border-blue-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Dirección</label>
                        <input type="text" name="direccion" class="w-full p-3 border-2 border-blue-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Documento</label>
                        <input type="text" name="Documento" class="w-full p-3 border-2 border-blue-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        
                        
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Rol</label>
                        <select name="rol" class="w-full p-3 border-2 border-blue-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                            <option value="Desarrollador">Desarrollador</option>
                            <option value="Líder de equipo">Líder de equipo</option>
                            <option value="Diseñador">Diseñador</option>
                            <option value="Tester">Tester</option>
                            
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Contraseña</label>
                        <input type="password" name="contrasena" required class="w-full p-3 border-2 border-blue-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg mt-6 hover:bg-blue-700 transition duration-300">Registrar Usuario</button>

                <div class="mt-4 text-center">
                    <p class="text-sm text-gray-500">¿Ya tienes cuenta? <a href="{% url 'inicio_sesion' %}" class="text-blue-600 hover:underline">Inicia sesión aquí</a></p>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
